name: Build Native APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- خطوة جديدة: تثبيت Gradle رسمياً (بدلاً من محاولة التوليد) ---
      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          sudo ln -s /opt/gradle-8.5/bin/gradle /usr/local/bin/gradle

      - name: Grant execute permission
        run: chmod +x gradlew || true

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlZahra-Native-App
          path: app/build/outputs/apk/debug/app-debug.apk
