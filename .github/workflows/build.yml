name: Build Native APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O /tmp/gradle.zip
          sudo unzip -q /tmp/gradle.zip -d /opt
          sudo ln -s /opt/gradle-8.5/bin/gradle /usr/local/bin/gradle

      # --- خطوة التخزين المؤقت للحفاظ على المفتاح ثابت ---
      - name: Cache Keystore
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: app/abuzahra.jks
          key: ${{ runner.os }}-keystore-v1

      # --- توليد المفتاح إذا لم يكن موجوداً ---
      - name: Generate Keystore if missing
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          echo "Generating new Keystore..."
          keytool -genkeypair -v -alias abuzahra -keyalg RSA -keysize 2048 -validity 10000 -keystore app/abuzahra.jks -storepass 123456 -keypass 123456 -dname "CN=AbuZahra, OU=Dev, O=AbuZahra, L=Sanaa, ST=Sanaa, C=YE"

      # --- طباعة البصمة لتستخدمها في Firebase ---
      - name: Print SHA-1 Key
        run: |
          echo "=========================================="
          echo "انسخ كود SHA1 التالي وضعه في Firebase Console:"
          keytool -list -v -keystore app/abuzahra.jks -storepass 123456 -alias abuzahra | grep SHA1
          echo "=========================================="

      - name: Grant execute permission
        run: chmod +x gradlew || true

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: 123456

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlZahra-Signed-App
          path: app/build/outputs/apk/release/app-release.apk
