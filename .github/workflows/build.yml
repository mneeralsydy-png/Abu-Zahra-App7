name: Build Native APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- خطوة جديد: توليد ملفات الـ Wrapper تلقائياً ---
      - name: Setup Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper missing. Generating..."
            wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip -O gradle.zip
            unzip -q gradle.zip
            ./gradle-8.5/bin/gradle wrapper --gradle-version 8.5
            rm -rf gradle-8.5 gradle.zip
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AbuAlZahra-Native-App
          path: app/build/outputs/apk/debug/app-debug.apk
